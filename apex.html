<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Apex">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="apex-manifest.json">
<title>Apex</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--s1:#141414;--s2:#1c1c1c;--s3:#242424;--s4:#2e2e2e;
  --cream:#f0ead8;--cm:#c8bfa8;--cf:#6e6660;--cd:#3a3530;
  --gold:#c9a84c;--gd:#8a6d2e;--gl:rgba(201,168,76,0.10);
  --border:rgba(240,234,216,0.07);--border2:rgba(240,234,216,0.12);
  --r:14px;--rs:9px;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--cream);overflow:hidden;-webkit-font-smoothing:antialiased;}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;height:calc(58px + var(--sb));background:rgba(10,10,10,0.97);border-top:1px solid var(--border2);display:flex;z-index:300;padding-bottom:var(--sb);backdrop-filter:blur(20px);}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--cf);font-family:'Jost',sans-serif;font-size:7px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;transition:color .2s;padding:0;}
.nb.active{color:var(--gold);}
.nb svg{width:18px;height:18px;stroke-width:1.5;}

/* SCREENS */
.screen{position:fixed;inset:0;bottom:calc(58px + var(--sb));overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;}
.screen.active{display:block;}

/* HEADER */
.hdr{background:rgba(10,10,10,0.96);padding:calc(var(--st) + 12px) 18px 10px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.hdr-row{display:flex;align-items:center;justify-content:space-between;}
.hdr-title{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:300;letter-spacing:4px;text-transform:uppercase;}
.hdr-sub{font-size:9px;color:var(--cf);letter-spacing:1.8px;text-transform:uppercase;margin-top:2px;}
.hdr-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--cm);font-family:'Jost',sans-serif;font-size:9px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:calc(68px + var(--sb));left:50%;transform:translateX(-50%) translateY(16px);background:var(--s3);border:1px solid var(--border2);border-radius:30px;padding:10px 16px;font-size:11px;letter-spacing:.4px;color:var(--cream);z-index:500;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;display:flex;align-items:center;gap:12px;box-shadow:0 8px 30px rgba(0,0,0,.5);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all;}
.toast-undo{color:var(--gold);font-weight:600;cursor:pointer;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;border-left:1px solid var(--border2);padding-left:12px;}

/* SCHEDULE TOGGLES */
.sched-controls{display:flex;align-items:center;gap:6px;padding:9px 18px 6px;}
.tog{padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--cf);font-family:'Jost',sans-serif;font-size:9px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.tog.on{background:var(--gl);border-color:rgba(201,168,76,.3);color:var(--gold);}

/* DAY BLOCK */
.day-block{margin-bottom:4px;}
.day-label{padding:16px 18px 8px;display:flex;align-items:baseline;gap:8px;}
.day-name{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;letter-spacing:2px;}
.day-date-tag{font-size:9px;color:var(--cf);letter-spacing:1.5px;text-transform:uppercase;}
.today-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);display:inline-block;vertical-align:middle;margin-left:3px;}
.empty-day{padding:10px 18px 14px;font-size:10px;color:var(--cd);letter-spacing:1px;font-style:italic;}

/* SESSION CARD */
.sess-card{margin:0 12px 5px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:opacity .25s;}
.sess-card.done-state{opacity:.45;}
.sess-card.cancelled-state{opacity:.3;}
.sess-top{display:flex;align-items:center;padding:13px 14px;gap:11px;cursor:pointer;user-select:none;}
.sess-time{font-size:11px;color:var(--cf);letter-spacing:.5px;min-width:36px;flex-shrink:0;}
.sess-info{flex:1;min-width:0;}
.sess-name{font-size:14px;font-weight:400;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sess-note{font-size:9px;color:var(--cf);letter-spacing:.5px;margin-top:1px;}
.sess-right{text-align:right;flex-shrink:0;}
.sess-rate{font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:.5px;color:var(--gold);}
.sess-badge{font-size:8px;padding:2px 6px;border-radius:8px;display:inline-block;margin-top:3px;letter-spacing:.3px;}
.badge-hi{background:rgba(74,158,106,.1);color:#6ecf94;border:1px solid rgba(74,158,106,.15);}
.badge-med{background:rgba(224,180,50,.1);color:#e0b432;border:1px solid rgba(224,180,50,.15);}
.badge-lo{background:rgba(192,57,43,.1);color:#e07878;border:1px solid rgba(192,57,43,.2);}
.sess-actions{display:flex;padding:0 10px 10px;gap:5px;}
.sa{flex:1;padding:8px 4px;border-radius:var(--rs);border:none;font-family:'Jost',sans-serif;font-size:8px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;transition:all .15s;text-align:center;}
.sa:active{transform:scale(.96);}
.sa-cancel{background:rgba(192,57,43,.08);color:#c0826c;border:1px solid rgba(192,57,43,.15);}
.sa-noshow{background:rgba(160,160,90,.07);color:#b0aa70;border:1px solid rgba(180,180,80,.12);}
.sa-reschedule{background:rgba(240,234,216,.05);color:var(--cm);border:1px solid var(--border2);}
.sa-left-group{display:flex;gap:5px;flex:1;}
.sa-done{min-width:72px;background:rgba(74,158,106,.18);color:var(--green);border:1px solid rgba(74,158,106,.3);font-weight:600;font-size:10px;padding:8px 14px;flex-shrink:0;}

/* EXPANDED SESSION */
.sess-expand{border-top:1px solid var(--border);padding:14px 14px 12px;display:none;animation:fadeIn .2s ease;}
.sess-expand.open{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.exp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.exp-lbl{font-size:8px;color:var(--cf);letter-spacing:1.5px;text-transform:uppercase;}
.exp-val{font-size:12px;letter-spacing:.3px;}
.exp-val.gold{color:var(--gold);}
.exp-val.muted{color:var(--cf);font-size:10px;}
.pkg-bar{height:3px;background:var(--s4);border-radius:2px;margin-top:2px;margin-bottom:10px;overflow:hidden;}
.pkg-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gd),var(--gold));transition:width .5s;}
.adj-row{display:flex;align-items:center;gap:8px;margin:2px 0 10px;}
.adj-btn{width:26px;height:26px;border-radius:50%;background:var(--s3);border:1px solid var(--border2);color:var(--cream);font-size:16px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.adj-num{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold);min-width:28px;text-align:center;}
.adj-hint{font-size:8px;color:var(--cf);letter-spacing:.5px;}
.pay-pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:12px;font-size:9px;letter-spacing:.5px;cursor:pointer;transition:all .2s;}
.pay-pending{background:rgba(224,112,80,.08);color:#e09070;border:1px solid rgba(224,112,80,.18);}
.pay-paid{background:rgba(74,158,106,.1);color:#6ecf94;border:1px solid rgba(74,158,106,.2);}
.exp-inp{background:var(--s3);border:1px solid var(--border2);border-radius:6px;padding:5px 9px;color:var(--cream);font-family:'Jost',sans-serif;font-size:12px;outline:none;-webkit-appearance:none;}
.exp-inp:focus{border-color:rgba(201,168,76,.3);}

/* TWO DAY VIEW */
.two-day-wrap{display:flex;}
.tdc{flex:1;border-right:1px solid var(--border);}
.tdc:last-child{border-right:none;}
.tdc .day-label{padding:10px 10px 6px;}
.tdc .day-name{font-size:14px;}
.tdc .sess-card{margin:0 6px 4px;}
.tdc .sess-top{padding:9px 10px;gap:7px;}
.tdc .sess-name{font-size:12px;}
.tdc .sess-rate{font-size:14px;}
.tdc .sess-actions{padding:0 6px 7px;gap:4px;}
.tdc .sa{font-size:7px;padding:6px 2px;letter-spacing:.4px;}

/* WEEK VIEW */
.week-wrap{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
.wkc{min-width:calc(100vw / 3.3);border-right:1px solid var(--border);flex-shrink:0;}
.wkc:last-child{border-right:none;}
.wkc .day-label{padding:8px 7px 5px;}
.wkc .day-name{font-size:12px;letter-spacing:1px;}
.wkc .sess-card{margin:0 4px 3px;border-radius:8px;}
.wkc .sess-top{padding:7px 7px;gap:4px;}
.wkc .sess-name{font-size:10px;}
.wkc .sess-time{font-size:8px;min-width:24px;}
.wkc .sess-right{display:none;}
.wkc .sess-note{display:none;}
.wkc .sess-actions{display:none;}
.wkc .sess-expand{display:none!important;}

/* MONEY */
.hero-card{margin:12px 12px 0;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;}
.hero-card::after{content:'';position:absolute;top:-50px;right:-30px;width:110px;height:110px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.05) 0%,transparent 70%);}
.hc-label{font-size:8px;color:var(--cf);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
.hc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.hc-tile{background:var(--s2);border-radius:var(--rs);padding:12px;}
.hc-tl{font-size:8px;color:var(--cf);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
.hc-tv{font-family:'Cormorant Garamond',serif;font-size:23px;font-weight:300;}
.hc-tv.inc{color:#6ecf94;}
.hc-tv.exp{color:#e07878;}
.hc-net{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--border);}
.hc-nl{font-size:9px;color:var(--cf);letter-spacing:1.5px;text-transform:uppercase;}
.hc-nv{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;}
.add-row{display:flex;gap:8px;padding:10px 12px 0;}
.add-btn{flex:1;padding:12px 8px;border-radius:var(--rs);border:1px solid;background:transparent;font-family:'Jost',sans-serif;font-size:9px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;text-align:center;}
.add-btn.inc{border-color:rgba(74,158,106,.25);color:#6ecf94;background:rgba(74,158,106,.05);}
.add-btn.exp{border-color:rgba(192,57,43,.2);color:#e07878;background:rgba(192,57,43,.04);}
.add-btn.inv{border-color:rgba(100,149,237,.25);color:#7eb8f7;background:rgba(100,149,237,.05);}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 8px;}
.sec-title{font-size:8px;color:var(--cf);letter-spacing:2px;text-transform:uppercase;}
.sec-toggle{font-size:9px;color:var(--gold);cursor:pointer;letter-spacing:.5px;}
/* Collapsible month card */
.month-card{margin:0 12px 10px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.mc-hdr{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;cursor:pointer;user-select:none;}
.mc-hdr-l{display:flex;align-items:baseline;gap:8px;}
.mc-month{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;}
.mc-net-inline{font-size:10px;letter-spacing:.3px;}
.mc-chevron{font-size:10px;color:var(--cf);transition:transform .2s;}
.mc-chevron.open{transform:rotate(180deg);}
.mc-body{border-top:1px solid var(--border);display:none;}
.mc-body.open{display:block;}
.mc-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;}
.mc-row+.mc-row{border-top:1px solid var(--border);}
.mc-lbl{font-size:10px;color:var(--cm);letter-spacing:.3px;}
.mc-val{font-family:'Cormorant Garamond',serif;font-size:17px;}
/* Budget bars */
.budget-section{padding:12px 14px;border-top:1px solid var(--border);}
.bud-title{font-size:8px;color:var(--cf);letter-spacing:1.8px;text-transform:uppercase;margin-bottom:10px;}
.bud-item{margin-bottom:10px;}
.bud-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.bud-lbl{font-size:10px;color:var(--cm);}
.bud-vals{font-size:9px;color:var(--cf);}
.bud-bar{height:3px;background:var(--s4);border-radius:2px;overflow:hidden;}
.bud-fill{height:100%;border-radius:2px;transition:width .5s;}
.bud-fill.ok{background:linear-gradient(90deg,#3a7a50,#6ecf94);}
.bud-fill.warn{background:linear-gradient(90deg,#8a6d2e,#e0b432);}
.bud-fill.over{background:linear-gradient(90deg,#8a2020,#e07878);}
/* savings row */
.save-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-top:1px solid var(--border);}
.save-lbl{font-size:10px;color:var(--cm);}
.save-badge{font-size:9px;padding:3px 8px;border-radius:10px;letter-spacing:.3px;}
.save-good{background:rgba(74,158,106,.1);color:#6ecf94;border:1px solid rgba(74,158,106,.2);}
.save-warn{background:rgba(224,180,50,.1);color:#e0b432;border:1px solid rgba(224,180,50,.2);}
.save-bad{background:rgba(192,57,43,.1);color:#e07878;border:1px solid rgba(192,57,43,.2);}
/* Transactions */
.tx-list{padding:0;}
.tx-item{display:flex;align-items:center;padding:11px 16px;gap:12px;border-bottom:1px solid var(--border);cursor:pointer;}
.tx-item:last-child{border-bottom:none;}
.tx-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.tx-dot.in{background:#4a9e6a;}
.tx-dot.out{background:#c0392b;}
.tx-dot.inv{background:#4a7abf;}
.tx-amt.inv{color:#7eb8f7;}
.tx-body{flex:1;min-width:0;}
.tx-desc{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-meta{font-size:9px;color:var(--cf);margin-top:1px;letter-spacing:.3px;}
.tx-amt{font-family:'Cormorant Garamond',serif;font-size:16px;flex-shrink:0;}
.tx-amt.in{color:#6ecf94;}
.tx-amt.out{color:#e07878;}

/* CLIENTS */
.cl-item{margin:0 12px 5px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.cl-top{display:flex;align-items:center;padding:13px 14px;gap:12px;cursor:pointer;}
.cl-av{width:36px;height:36px;border-radius:50%;background:var(--gl);border:1px solid rgba(201,168,76,.18);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--gold);flex-shrink:0;}
.cl-info{flex:1;min-width:0;}
.cl-name{font-size:14px;font-weight:400;}
.cl-sub{font-size:9px;color:var(--cf);letter-spacing:.4px;margin-top:1px;}
.cl-r{text-align:right;}
.cl-rate{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--gold);}
.cl-expand{border-top:1px solid var(--border);padding:14px;display:none;animation:fadeIn .2s;}
.cl-expand.open{display:block;}
.cl-er{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.cl-el{font-size:8px;color:var(--cf);letter-spacing:1.5px;text-transform:uppercase;}
.cl-ev{font-size:12px;letter-spacing:.3px;}
.cl-footer{display:flex;gap:6px;margin-top:10px;}
.cl-ft-btn{flex:1;padding:8px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--s3);color:var(--cf);font-family:'Jost',sans-serif;font-size:8px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;text-align:center;}
.cl-ft-btn.primary{border-color:rgba(201,168,76,.2);color:var(--gold);background:var(--gl);}

/* SETTINGS */
.settings-pad{padding:14px;}
.set-section{margin-bottom:14px;}
.set-hdr{font-size:8px;color:var(--cf);letter-spacing:2px;text-transform:uppercase;padding:0 2px 8px;}
.set-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:1px solid var(--border);}
.set-row:last-child{border-bottom:none;}
.set-lbl{font-size:13px;}
.set-sub{font-size:9px;color:var(--cf);margin-top:2px;letter-spacing:.3px;}
.set-inp{background:transparent;border:none;color:var(--gold);font-family:"Cormorant Garamond",serif;font-size:17px;text-align:right;width:120px;outline:none;-webkit-appearance:none;}
.set-inp:focus{color:var(--cream);}

/* GOALS */
.goals-pad{padding:14px;}
.g-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;}
.g-title{font-size:8px;color:var(--cf);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
.g-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.g-lbl{font-size:12px;color:var(--cm);}
.g-val{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--gold);}
.prog{height:3px;background:var(--s4);border-radius:2px;overflow:hidden;margin-bottom:4px;}
.prog-f{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gd),var(--gold));}
.g-hint{font-size:9px;color:var(--cf);letter-spacing:.5px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.stat-t{background:var(--s2);border-radius:var(--rs);padding:12px;}
.stat-l{font-size:8px;color:var(--cf);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px;}
.stat-v{font-family:'Cormorant Garamond',serif;font-size:20px;}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:400;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(6px);}
.mo.open{opacity:1;pointer-events:all;}
.mo-box{background:var(--s2);border-radius:var(--r) var(--r) 0 0;padding:20px 18px calc(18px + var(--sb));width:100%;transform:translateY(24px);transition:transform .28s cubic-bezier(.34,1.1,.64,1);max-height:88vh;overflow-y:auto;}
.mo.open .mo-box{transform:translateY(0);}
.mo-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.mo-title{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:300;letter-spacing:2px;}
.mo-x{width:28px;height:28px;border-radius:50%;background:var(--s4);border:none;color:var(--cf);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.fld{margin-bottom:14px;}
.fld label{display:block;font-size:8px;color:var(--cf);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.inp{width:100%;background:var(--s3);border:1px solid var(--border2);border-radius:var(--rs);padding:11px 13px;color:var(--cream);font-family:'Jost',sans-serif;font-size:14px;outline:none;-webkit-appearance:none;appearance:none;}
.inp:focus{border-color:rgba(201,168,76,.3);}
.type-tabs{display:flex;gap:6px;margin-bottom:14px;}
.tt{flex:1;padding:9px;border-radius:var(--rs);border:1px solid var(--border);background:transparent;color:var(--cf);font-family:'Jost',sans-serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;text-align:center;transition:all .2s;}
.tt.on.inc{background:rgba(74,158,106,.1);border-color:rgba(74,158,106,.3);color:#6ecf94;}
.tt.on.exp{background:rgba(192,57,43,.1);border-color:rgba(192,57,43,.25);color:#e07878;}

  {id:15,name:"Kavitha",rate:95,sessPerWeek:2,days:"Wed · Fri",payMode:"package",pkgSize:10,payNote:"10 sessions at a time."},
  {id:16,name:"Iz",rate:75,sessPerWeek:1,days:"Wed",payMode:"per_session",payNote:"RM 75 right after each session."},
  {id:17,name:"Iz's Mum",rate:75,sessPerWeek:1,days:"Wed",payMode:"per_session",payNote:"RM 75 right after each session."},
  {id:18,name:"Family Training",rate:0,sessPerWeek:1,days:"Sun",payMode:"monthly",payNote:"Personal — parents & sister. No charge.",noRevenue:true},
  {id:19,name:"Carine",rate:100,sessPerWeek:1.5,days:"Ad hoc",payMode:"per_session",payNote:"RM 100 per session. Ad hoc."},
];
const DOWMAP={0:'Sun',1:'Mon',2:'Tue',3:'Wed',4:'Thu',5:'Fri',6:'Sat'};
const DOWFULL={0:'Sunday',1:'Monday',2:'Tuesday',3:'Wednesday',4:'Thursday',5:'Friday',6:'Saturday'};
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let S={};
let view=1;
let undoData=null;
let toastTmr=null;
let pendReschedId=null;
let pendTxType='income';
let xSess={};  // expanded sessions
let xClient={}; // expanded clients

// ─── UTILS ───────────────────────────────────────────
const today=()=>{const d=new Date();return dISO(d);};
const dISO=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
const pad=n=>String(n).padStart(2,'0');
const offset=n=>{const d=new Date();d.setDate(d.getDate()+n);return d;};
const fmtD=iso=>{const d=new Date(iso+'T00:00:00');return d.getDate()+' '+MON[d.getMonth()];};
const fmtDLong=iso=>{const d=new Date(iso+'T00:00:00');return DOWFULL[d.getDay()]+', '+d.getDate()+' '+MON[d.getMonth()];};
const rm=n=>'RM '+Math.round(n).toLocaleString('en-MY');
const ini=n=>n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const genId=()=>'s'+Date.now()+Math.random().toString(36).slice(2,6);
const txId=()=>'t'+Date.now()+Math.random().toString(36).slice(2,5);

// ─── STORAGE ─────────────────────────────────────────
const SB_URL='https://paapudzcfkufdhoyllme.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBhYXB1ZHpjZmt1ZmRob3lsbG1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NzE1NjksImV4cCI6MjA4ODM0NzU2OX0.GMmx43KiWaCQkCAVd7-bF-uzNYkI306vb4jJc2nWykg';
let saveTimer=null;

function save(){
  // Always save to localStorage as instant backup
  try{localStorage.setItem('apex_v6',JSON.stringify(S));}catch(e){}
  // Debounce cloud save by 1.5s to avoid hammering API
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(saveCloud,1500);
}

async function saveCloud(){
  try{
    const res=await fetch(SB_URL+'/rest/v1/apex_data?id=eq.main',{
      method:'PATCH',
      headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=minimal'},
      body:JSON.stringify({data:S,updated_at:new Date().toISOString()})
    });
    if(!res.ok)throw new Error('PATCH failed '+res.status);
  }catch(e){console.error('Cloud save failed:',e);}
}

async function loadCloud(){
  try{
    const res=await fetch(SB_URL+'/rest/v1/apex_data?id=eq.main&select=data',{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    });
    if(!res.ok)throw new Error('Load failed '+res.status);
    const rows=await res.json();
    if(rows&&rows.length&&rows[0].data&&Object.keys(rows[0].data).length>0){
      S=rows[0].data;
      return true;
    }
  }catch(e){console.error('Cloud load failed:',e);}
  return false;
}
function initDefaults(){
  if(!S.sess)S.sess={};
  if(!S.pkgRem)S.pkgRem={};
  if(!S.pkgHist)S.pkgHist={};
  if(!S.tx)S.tx=[];
  if(!S.goals)S.goals={targetIncome:20000,targetNW:100000,monthlyExpenses:3000,savingsGoal:5000};
  if(!S.goals.monthlyExpenses)S.goals.monthlyExpenses=3000;
  if(!S.goals.savingsGoal)S.goals.savingsGoal=5000;
  CLIENTS.filter(c=>c.payMode==='package').forEach(c=>{
    if(S.pkgRem[c.id]==null)S.pkgRem[c.id]=c.pkgSize||10;
  });
}

function load(){
  try{const r=localStorage.getItem('apex_v6');if(r)S=JSON.parse(r);}catch(e){S={};}
  initDefaults();
}

async function loadAndSync(){
  const gotCloud=await loadCloud();
  if(gotCloud){
    initDefaults();
    try{localStorage.setItem('apex_v6',JSON.stringify(S));}catch(e){}
  } else {
    load();
  }
  buildRange();save();
  renderSched();renderClients();renderGoals();
}

// ─── SESSION BUILDER ─────────────────────────────────
function buildSess(iso){
  const d=new Date(iso+'T00:00:00');
  const dow=DOWMAP[d.getDay()];
  CLIENTS.forEach(c=>{
    if(!c.days.includes(dow))return;
    const exists=Object.values(S.sess).find(s=>s.cid===c.id&&s.date===iso&&s.status!=='rescheduled');
    if(!exists){
      const id=genId();
      S.sess[id]={id,cid:c.id,date:iso,time:'',status:'pending',note:''};
    }
  });
}
function buildRange(n=14){for(let i=-3;i<n;i++)buildSess(dISO(offset(i)));}
function sessForDate(iso){return Object.values(S.sess).filter(s=>s.date===iso&&s.status!=='rescheduled').sort((a,b)=>(a.time||'').localeCompare(b.time||''));}

// ─── NAV ─────────────────────────────────────────────
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nb-'+name).classList.add('active');
  if(name==='sched')renderSched();
  if(name==='money')renderMoney();
  if(name==='clients')renderClients();
  if(name==='goals')renderGoals();
  if(name==='settings')renderSettings();
}

// ─── SCHEDULE ────────────────────────────────────────
function setView(n){
  view=n;
  ['1','2','7'].forEach(x=>document.getElementById('tog'+x).classList.remove('on'));
  document.getElementById('tog'+n).classList.add('on');
  renderSched();
}

function renderSched(){
  buildRange();save();
  const td=today();
  const el=document.getElementById('schedContent');
  
  if(view===1){
    document.getElementById('schedSub').textContent='Scroll for more days';
    let h='';
    for(let i=-1;i<9;i++){
      const d=offset(i);const iso=dISO(d);const isT=iso===td;
      const ss=sessForDate(iso);
      h+=`<div class="day-block" id="db-${iso}">
        <div class="day-label">
          <span class="day-name">${DOWFULL[d.getDay()]}</span>
          ${isT?'<span class="today-dot"></span>':''}
          <span class="day-date-tag">${d.getDate()} ${MON[d.getMonth()]}</span>
        </div>
        ${ss.length?ss.map(s=>buildCard(s,false)).join(''):`<div class="empty-day">Rest day</div>`}
      </div>`;
    }
    el.innerHTML=h;
    setTimeout(()=>{const t=document.getElementById('db-'+td);if(t)t.scrollIntoView({behavior:'smooth',block:'start'});},80);
  } else if(view===2){
    document.getElementById('schedSub').textContent='Today & tomorrow';
    const d0=new Date(),d1=offset(1);
    const i0=dISO(d0),i1=dISO(d1);
    el.innerHTML=`<div class="two-day-wrap">
      <div class="tdc">
        <div class="day-label"><span class="day-name">${DOWFULL[d0.getDay()]}</span><span class="today-dot"></span><span class="day-date-tag">${d0.getDate()} ${MON[d0.getMonth()]}</span></div>
        ${sessForDate(i0).map(s=>buildCard(s,true)).join('')||'<div class="empty-day">Rest day</div>'}
      </div>
      <div class="tdc">
        <div class="day-label"><span class="day-name">${DOWFULL[d1.getDay()]}</span><span class="day-date-tag">${d1.getDate()} ${MON[d1.getMonth()]}</span></div>
        ${sessForDate(i1).map(s=>buildCard(s,true)).join('')||'<div class="empty-day">Rest day</div>'}
      </div>
    </div>`;
  } else {
    document.getElementById('schedSub').textContent='7-day week';
    let cols='';
    for(let i=0;i<7;i++){
      const d=offset(i);const iso=dISO(d);const isT=iso===td;
      const ss=sessForDate(iso);
      cols+=`<div class="wkc">
        <div class="day-label">
          <span class="day-name">${DOWMAP[d.getDay()]}${isT?'<span class="today-dot" style="margin-left:3px;"></span>':''}</span>
          <span class="day-date-tag">${d.getDate()}</span>
        </div>
        ${ss.length?ss.map(s=>buildCardMini(s)).join(''):`<div class="empty-day" style="font-size:8px;padding:5px 7px;">—</div>`}
      </div>`;
    }
    el.innerHTML=`<div class="week-wrap">${cols}</div>`;
  }
  // restore expanded
  Object.keys(xSess).forEach(id=>{if(xSess[id]){const e=document.getElementById('sx-'+id);if(e)e.classList.add('open');}});
}

function buildCard(s,compact){
  const c=CLIENTS.find(x=>x.id===s.cid)||{name:'Unknown',rate:0};
  const isDone=s.status==='done';
  const isCan=s.status==='cancelled'||s.status==='noshow';
  const rem=c.payMode==='package'?S.pkgRem[c.id]:null;

  return `<div class="sess-card ${isDone?'done-state':isCan?'cancelled-state':''}" id="sc-${s.id}">

function toggleXSess(id){

}

function refreshExpand(id){
  const s=S.sess[id];if(!s)return;
  const c=CLIENTS.find(x=>x.id===s.cid);if(!c)return;
  const e=document.getElementById('sx-'+id);if(e&&e.classList.contains('open'))e.innerHTML=buildExpand(s,c);
}

function togglePay(id){
  S.sess[id].paid=!S.sess[id].paid;save();refreshExpand(id);
  showToast(S.sess[id].paid?'Marked as paid':'Marked as pending');
}

function adjPkg(cid,delta,e){
  if(e)e.stopPropagation();
  S.pkgRem[cid]=Math.max(0,(S.pkgRem[cid]||0)+delta);
  save();
  // update adj numbers inline
  document.querySelectorAll('#adj-'+cid).forEach(el=>el.textContent=S.pkgRem[cid]);
  renderClients();
}

function act(id,action,e){
  if(e){e.stopPropagation();e.preventDefault();}
  const s=S.sess[id];if(!s)return;
  const prev=JSON.parse(JSON.stringify(s));
  if(action==='reschedule'){
    pendReschedId=id;
    document.getElementById('rsDate').value=s.date;
    document.getElementById('rsTime').value=s.time||'07:00';
    document.getElementById('rsNote').value='';
    document.getElementById('moResched').classList.add('open');
    return;
  }
  if(action==='done'){
    s.status='done';
    const c=CLIENTS.find(x=>x.id===s.cid);
    if(c&&c.payMode==='package'&&S.pkgRem[c.id]>0){S.pkgRem[c.id]--;}
    showUndo('Marked done',{type:'sess',id,prev,pkgCid:c&&c.payMode==='package'?c.id:null,pkgPrev:c&&c.payMode==='package'?S.pkgRem[c.id]+1:null});
  } else if(action==='cancel'){
    s.status='cancelled';
    showUndo('Session cancelled',{type:'sess',id,prev});
  } else if(action==='noshow'){
    s.status='noshow';
    showUndo('Marked no-show',{type:'sess',id,prev});
  }
  save();
  const card=document.getElementById('sc-'+id);
  if(card){
    card.classList.toggle('done-state',action==='done');
    card.classList.toggle('cancelled-state',action==='cancel'||action==='noshow');
  }
}

function confirmResched(){
  const id=pendReschedId;if(!id)return;
  const s=S.sess[id];if(!s)return;
  const prev=JSON.parse(JSON.stringify(s));
  const nd=document.getElementById('rsDate').value;
  const nt=document.getElementById('rsTime').value;
  const note=document.getElementById('rsNote').value;
  s.status='rescheduled';
  const nid=genId();
  S.sess[nid]={id:nid,cid:s.cid,date:nd,time:nt,status:'pending',note:note||'Rescheduled',rFrom:id};
  save();closeMOId('moResched');
  showUndo(`Rescheduled → ${fmtD(nd)}`,{type:'resched',oid:id,nid,prev});
  renderSched();
}

// ─── UNDO ─────────────────────────────────────────────
function showUndo(msg,data){
  undoData=data;
  document.getElementById('toastMsg').textContent=msg;
  document.getElementById('toastUndo').style.display='inline';
  const t=document.getElementById('toast');t.classList.add('show');
  if(toastTmr)clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>{t.classList.remove('show');undoData=null;},5000);
}
function showToast(msg){
  document.getElementById('toastMsg').textContent=msg;
  document.getElementById('toastUndo').style.display='none';
  const t=document.getElementById('toast');t.classList.add('show');
  if(toastTmr)clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>t.classList.remove('show'),2200);
}
function doUndo(){
  if(!undoData)return;
  const u=undoData;
  if(u.type==='sess'){
    S.sess[u.id]=u.prev;
    if(u.pkgCid!=null)S.pkgRem[u.pkgCid]=u.pkgPrev;
    save();renderSched();showToast('Undone');
  } else if(u.type==='resched'){
    S.sess[u.oid]=u.prev;delete S.sess[u.nid];
    save();renderSched();showToast('Reschedule undone');
  } else if(u.type==='tx'){
    S.tx=S.tx.filter(t=>t.id!==u.tid);
    save();renderMoney();showToast('Transaction removed');
  }
  undoData=null;
  document.getElementById('toast').classList.remove('show');
}

  pendTxType=type;

  document.getElementById('ttInv').className='tt inv'+(type==='invest'?' on':'');
  document.getElementById('txClientFld').style.display=type==='income'?'block':'none';
  document.getElementById('txInvFld').style.display=type==='invest'?'block':'none';
}
function saveTx(){
  const amt=parseFloat(document.getElementById('txAmt').value);
  const desc=document.getElementById('txDesc').value.trim();
  const date=document.getElementById('txDate').value;
  const method=document.getElementById('txMethod').value;
  const cid=parseInt(document.getElementById('txClient').value)||null;
  if(!amt||amt<=0){showToast('Enter a valid amount');return;}
  if(!date){showToast('Enter a date');return;}
  const cl=cid?CLIENTS.find(c=>c.id===cid):null;
  const invType=pendTxType==='invest'?document.getElementById('txInvType').value:null;
  const defDesc=pendTxType==='income'?'Income':pendTxType==='invest'?'Investment':'Expense';
  const tx={id:txId(),type:pendTxType,amount:amt,desc:desc||defDesc,method,cid,cn:cl?cl.name:null,date,invType};
  S.tx.push(tx);save();
  closeMOId('moTx');renderMoney();

function updateGoal(key,val){
  S.goals[key]=parseFloat(val)||0;
  save();showToast('Saved');
}
function exportData(){
  const json=JSON.stringify(S,null,2);
  navigator.clipboard.writeText(json).then(()=>showToast('Data copied to clipboard')).catch(()=>showToast('Open in browser to export'));
}
function confirmClear(){
  if(confirm('Clear ALL data? This cannot be undone.')){
    localStorage.removeItem('apex_v6');localStorage.removeItem('apex_v5');S={};initDefaults();saveCloud();
    showToast('Data cleared');renderSched();renderMoney();renderClients();renderGoals();
  }
}

// ─── ADD CLIENT ──────────────────────────────────────
function openAddClient(){
  document.getElementById('acName').value='';
  document.getElementById('acRate').value='';
  document.getElementById('acSPW').value='';
  document.getElementById('acDays').value='';
  document.getElementById('acPayMode').value='per_session';
  document.getElementById('acPkgSize').value='10';
  document.getElementById('acPayNote').value='';
  document.getElementById('acNoRevenue').checked=false;
  document.getElementById('acPkgFld').style.display='none';
  document.getElementById('moAddClient').classList.add('open');
}
function togglePkgSize(){
  const mode=document.getElementById('acPayMode').value;
  document.getElementById('acPkgFld').style.display=mode==='package'?'block':'none';
}
function confirmAddClient(){
  const name=document.getElementById('acName').value.trim();
  const rate=parseFloat(document.getElementById('acRate').value)||0;
  const spw=parseFloat(document.getElementById('acSPW').value)||1;
  const days=document.getElementById('acDays').value.trim()||'TBD';
  const payMode=document.getElementById('acPayMode').value;
  const pkgSize=parseInt(document.getElementById('acPkgSize').value)||10;
  const payNote=document.getElementById('acPayNote').value.trim()||'';
  const noRevenue=document.getElementById('acNoRevenue').checked;
  if(!name){showToast('Enter a name');return;}
  // Generate new ID (max existing + 1)
  const maxId=Math.max(0,...CLIENTS.map(c=>c.id));
  const newId=maxId+1;
  const newClient={id:newId,name,rate,sessPerWeek:spw,days,payMode,payNote,noRevenue:noRevenue||undefined};
  if(payMode==='package')newClient.pkgSize=pkgSize;
  CLIENTS.push(newClient);
  if(payMode==='package')S.pkgRem[newId]=pkgSize;
  save();
  closeMOId('moAddClient');
  renderClients();
  document.getElementById('clientsSub').textContent=CLIENTS.length+' active';
  showToast(name+' added');
}

// ─── ADD SESSION ─────────────────────────────────────
function openAddSess(){
  document.getElementById('asClient').innerHTML=CLIENTS.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  document.getElementById('asDate').value=today();
  document.getElementById('asTime').value='07:00';
  document.getElementById('moAddSess').classList.add('open');
}
function confirmAddSess(){
  const cid=parseInt(document.getElementById('asClient').value);
  const date=document.getElementById('asDate').value;
  const time=document.getElementById('asTime').value;
  if(!cid||!date)return;
  const id=genId();
  S.sess[id]={id,cid,date,time,status:'pending',note:'Added manually'};
  save();closeMOId('moAddSess');renderSched();showToast('Session added');
}

// ─── MODAL UTILS ─────────────────────────────────────
function closeMO(id,e){if(e.target.id===id)closeMOId(id);}
function closeMOId(id){document.getElementById(id).classList.remove('open');}

// ─── BOOT ────────────────────────────────────────────
// Boot — load local instantly, then sync from cloud
load();buildRange();save();
renderSched();renderClients();renderGoals();
// Then sync cloud in background
loadAndSync();
</script>
